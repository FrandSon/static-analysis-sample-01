version: '3.8'

services:
  sonarqube:
    image: docker.io/library/sonarqube:latest
    container_name: sonarqube-server
    ports:
      - "9000:9000"
    networks:
      - sonarnet
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://db:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
    volumes:
      - ./sonarqube_conf:/opt/sonarqube/conf:Z
      - ./sonarqube_data:/opt/sonarqube/data:Z
      - ./sonarqube_extensions:/opt/sonarqube/extensions:Z
      - ./sonarqube_bundled-plugins:/opt/sonarqube/lib/bundled-plugins:Z

  db:
    image: docker.io/library/postgres:15-alpine
    container_name: postgres-db
    networks:
      - sonarnet
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonar
    volumes:
      - ./postgresql_data:/var/lib/postgresql/data:Z

networks:
  sonarnet:
    driver: bridge
